<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Muse dashboard screenshot</title>
  <desc id="desc">A terminal screenshot showing the Muse now playing dashboard with playback controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#141417"/>
      <stop offset="1" stop-color="#202026"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="#0f1014"/>
  <rect x="72" y="54" width="1056" height="652" rx="14" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="72" y="54" width="1056" height="42" rx="14" fill="#2a2a30"/>
  <circle cx="102" cy="75" r="7" fill="#ff5f57"/>
  <circle cx="126" cy="75" r="7" fill="#ffbd2e"/>
  <circle cx="150" cy="75" r="7" fill="#28c840"/>
  <text x="600" y="80" text-anchor="middle" fill="#a8a8b3" font-family="Menlo,Consolas,monospace" font-size="14">mu</text>

  <text x="118" y="146" fill="#ff2d55" font-family="Menlo,Consolas,monospace" font-size="26" font-weight="700">M U S E</text>
  <text x="118" y="176" fill="#8e8e93" font-family="Menlo,Consolas,monospace" font-size="15">Apple Music from your terminal</text>

  <rect x="118" y="214" width="964" height="242" rx="10" fill="#2c2c2e" stroke="#ff2d55" stroke-width="2"/>
  <rect x="158" y="256" width="196" height="154" rx="8" fill="#18181d" stroke="#ff2d55" stroke-width="2"/>
  <circle cx="256" cy="333" r="52" fill="#24242a" stroke="#ff2d55" stroke-width="8"/>
  <circle cx="256" cy="333" r="14" fill="#ff2d55"/>
  <path d="M256 281 A52 52 0 0 1 308 333" fill="none" stroke="#ff8aa6" stroke-width="8" stroke-linecap="round"/>

  <text x="404" y="278" fill="#ff2d55" font-family="Menlo,Consolas,monospace" font-size="36" font-weight="700">NIGHTS</text>
  <text x="404" y="326" fill="#ffffff" font-family="Menlo,Consolas,monospace" font-size="22" font-weight="700">Frank Ocean</text>
  <text x="404" y="358" fill="#b5b5bd" font-family="Menlo,Consolas,monospace" font-size="19" font-style="italic">Blonde</text>
  <text x="404" y="408" fill="#34c759" font-family="Menlo,Consolas,monospace" font-size="18" font-weight="700">● Playing</text>
  <text x="528" y="408" fill="#b5b5bd" font-family="Menlo,Consolas,monospace" font-size="18">♪ 72%</text>
  <text x="626" y="408" fill="#ff2d55" font-family="Menlo,Consolas,monospace" font-size="18">⇄ On</text>
  <text x="714" y="408" fill="#ff2d55" font-family="Menlo,Consolas,monospace" font-size="18">↻ All</text>
  <text x="812" y="408" fill="#ff2d55" font-family="Menlo,Consolas,monospace" font-size="18">♥</text>
  <text x="404" y="438" fill="#8e8e93" font-family="Menlo,Consolas,monospace" font-size="16">01:05  ━━━━━━━━━━━━━●────────────────────  03:05</text>

  <rect x="118" y="492" width="470" height="140" rx="10" fill="#18181d" stroke="#ff2d55" stroke-width="2"/>
  <text x="148" y="530" fill="#ff2d55" font-family="Menlo,Consolas,monospace" font-size="17" font-weight="700">NAVIGATION</text>
  <rect x="148" y="552" width="270" height="26" rx="4" fill="#ff2d55"/>
  <text x="160" y="571" fill="#000000" font-family="Menlo,Consolas,monospace" font-size="16" font-weight="700">&gt; Library Playlists</text>
  <text x="160" y="600" fill="#ffffff" font-family="Menlo,Consolas,monospace" font-size="16">  Search Library</text>
  <text x="160" y="626" fill="#ffffff" font-family="Menlo,Consolas,monospace" font-size="16">  Lyrics</text>

  <rect x="612" y="492" width="470" height="140" rx="10" fill="#18181d" stroke="#8e8e93" stroke-width="2"/>
  <text x="642" y="530" fill="#ff2d55" font-family="Menlo,Consolas,monospace" font-size="17" font-weight="700">CONTROLS</text>
  <text x="654" y="571" fill="#ffffff" font-family="Menlo,Consolas,monospace" font-size="16">Play        Pause</text>
  <text x="654" y="600" fill="#ffffff" font-family="Menlo,Consolas,monospace" font-size="16">Next        Previous</text>
  <text x="654" y="626" fill="#8e8e93" font-family="Menlo,Consolas,monospace" font-size="16">Space toggle · s shuffle · r repeat</text>

  <text x="118" y="670" fill="#8e8e93" font-family="Menlo,Consolas,monospace" font-size="15">Navigate with arrows · Enter select · / search · q quit</text>
</svg>
