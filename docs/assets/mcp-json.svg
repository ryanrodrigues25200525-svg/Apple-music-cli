<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Muse MCP and JSON screenshot</title>
  <desc id="desc">A terminal screenshot showing JSON output and MCP music context data.</desc>
  <rect width="1200" height="760" fill="#0f1014"/>
  <rect x="72" y="54" width="1056" height="652" rx="14" fill="#171820"/>
  <rect x="72" y="54" width="1056" height="42" rx="14" fill="#2a2a30"/>
  <circle cx="102" cy="75" r="7" fill="#ff5f57"/>
  <circle cx="126" cy="75" r="7" fill="#ffbd2e"/>
  <circle cx="150" cy="75" r="7" fill="#28c840"/>
  <text x="600" y="80" text-anchor="middle" fill="#a8a8b3" font-family="Menlo,Consolas,monospace" font-size="14">mu now --json</text>

  <text x="118" y="146" fill="#ff2d55" font-family="Menlo,Consolas,monospace" font-size="24" font-weight="700">SCRIPTABLE OUTPUT</text>
  <text x="118" y="178" fill="#8e8e93" font-family="Menlo,Consolas,monospace" font-size="15">Use Muse in shell scripts, status bars, and MCP clients.</text>

  <rect x="118" y="222" width="488" height="440" rx="10" fill="#22232a" stroke="#ff2d55" stroke-width="2"/>
  <text x="148" y="260" fill="#8e8e93" font-family="Menlo,Consolas,monospace" font-size="15">$ mu now --json</text>
  <text x="148" y="302" fill="#ffffff" font-family="Menlo,Consolas,monospace" font-size="15">{</text>
  <text x="168" y="332" fill="#ff8aa6" font-family="Menlo,Consolas,monospace" font-size="15">"title"</text>
  <text x="252" y="332" fill="#ffffff" font-family="Menlo,Consolas,monospace" font-size="15">: "Nights",</text>
  <text x="168" y="362" fill="#ff8aa6" font-family="Menlo,Consolas,monospace" font-size="15">"artist"</text>
  <text x="260" y="362" fill="#ffffff" font-family="Menlo,Consolas,monospace" font-size="15">: "Frank Ocean",</text>
  <text x="168" y="392" fill="#ff8aa6" font-family="Menlo,Consolas,monospace" font-size="15">"album"</text>
  <text x="252" y="392" fill="#ffffff" font-family="Menlo,Consolas,monospace" font-size="15">: "Blonde",</text>
  <text x="168" y="422" fill="#ff8aa6" font-family="Menlo,Consolas,monospace" font-size="15">"state"</text>
  <text x="252" y="422" fill="#ffffff" font-family="Menlo,Consolas,monospace" font-size="15">: "playing",</text>
  <text x="168" y="452" fill="#ff8aa6" font-family="Menlo,Consolas,monospace" font-size="15">"volume"</text>
  <text x="260" y="452" fill="#ffffff" font-family="Menlo,Consolas,monospace" font-size="15">: 72,</text>
  <text x="168" y="482" fill="#ff8aa6" font-family="Menlo,Consolas,monospace" font-size="15">"shuffle"</text>
  <text x="268" y="482" fill="#ffffff" font-family="Menlo,Consolas,monospace" font-size="15">: true,</text>
  <text x="168" y="512" fill="#ff8aa6" font-family="Menlo,Consolas,monospace" font-size="15">"repeat"</text>
  <text x="260" y="512" fill="#ffffff" font-family="Menlo,Consolas,monospace" font-size="15">: "all",</text>
  <text x="168" y="542" fill="#ff8aa6" font-family="Menlo,Consolas,monospace" font-size="15">"loved"</text>
  <text x="252" y="542" fill="#ffffff" font-family="Menlo,Consolas,monospace" font-size="15">: true</text>
  <text x="148" y="572" fill="#ffffff" font-family="Menlo,Consolas,monospace" font-size="15">}</text>

  <rect x="642" y="222" width="440" height="440" rx="10" fill="#22232a" stroke="#8e8e93" stroke-width="2"/>
  <text x="672" y="260" fill="#8e8e93" font-family="Menlo,Consolas,monospace" font-size="15">MCP tool: music_context</text>
  <text x="672" y="304" fill="#ffffff" font-family="Menlo,Consolas,monospace" font-size="15">now_playing</text>
  <rect x="672" y="320" width="300" height="8" rx="4" fill="#ff2d55"/>
  <text x="672" y="360" fill="#ffffff" font-family="Menlo,Consolas,monospace" font-size="15">stats</text>
  <rect x="672" y="376" width="220" height="8" rx="4" fill="#ff2d55"/>
  <text x="672" y="416" fill="#ffffff" font-family="Menlo,Consolas,monospace" font-size="15">queue</text>
  <rect x="672" y="432" width="270" height="8" rx="4" fill="#ff2d55"/>
  <text x="672" y="472" fill="#ffffff" font-family="Menlo,Consolas,monospace" font-size="15">lyrics</text>
  <rect x="672" y="488" width="330" height="8" rx="4" fill="#ff2d55"/>
  <text x="672" y="560" fill="#8e8e93" font-family="Menlo,Consolas,monospace" font-size="15">Agents can read, control, and summarize</text>
  <text x="672" y="590" fill="#8e8e93" font-family="Menlo,Consolas,monospace" font-size="15">your local Music.app session.</text>
</svg>
